<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rugrom</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
            overflow: hidden;
        }
        
        #app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 900px;
            background: white;
            box-shadow: 0 20px 60px rgba(0, 120, 255, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background 0.3s, color 0.3s;
        }
        
        body.dark #app {
            background: #1a2332;
            color: #e8edf3;
        }
        body.dark {
            background: #0d1520;
        }
        
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: inherit;
            overflow: hidden;
        }
        .screen.active {
            display: flex;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px;
            border-bottom: 1px solid #e8f0f8;
            flex-shrink: 0;
            background: inherit;
            z-index: 10;
        }
        body.dark .header {
            border-bottom-color: #2a3a4a;
        }
        .header h2 {
            font-size: 20px;
            color: #007aff;
            font-weight: 700;
        }
        body.dark .header h2 {
            color: #5b9eff;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn:hover { background: #005bbf; }
        .btn-outline {
            background: transparent;
            border: 2px solid #007aff;
            color: #007aff;
        }
        .btn-outline:hover { background: rgba(0,122,255,0.08); }
        .btn-danger {
            background: #ff3b30;
        }
        .btn-danger:hover { background: #d6302a; }
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
            width: auto;
        }
        .btn-link {
            background: none;
            color: #007aff;
            padding: 8px;
            font-size: 14px;
            width: auto;
        }
        .btn-link:hover {
            text-decoration: underline;
            background: none;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #dce8f2;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            background: white;
            color: #1a2332;
        }
        body.dark input, body.dark textarea, body.dark select {
            background: #263445;
            border-color: #3a4a5a;
            color: #e8edf3;
        }
        input:focus, textarea:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
        }
        
        #loginScreen {
            justify-content: center;
            padding: 40px 30px;
            gap: 16px;
        }
        #loginScreen .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        #loginScreen .logo h1 {
            color: #007aff;
            font-size: 48px;
            font-weight: 800;
        }
        #loginScreen .logo p {
            color: #6c7a8a;
            font-size: 16px;
            margin-top: 4px;
        }
        body.dark #loginScreen .logo p {
            color: #8a9aaa;
        }
        #loginError, #registerError {
            color: #ff3b30;
            font-size: 14px;
            text-align: center;
            min-height: 24px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 8px;
        }
        .auth-switch .btn-link {
            font-size: 15px;
            font-weight: 600;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .auth-form.hidden {
            display: none;
        }
        
        .badge-container {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
            align-items: center;
        }
        .badge-item {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 1px 8px 1px 6px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            line-height: 1.4;
            cursor: default;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        .badge-item:hover {
            transform: scale(1.05);
        }
        .badge-item .badge-icon {
            font-size: 12px;
        }
        .badge-creator { background: #34c759; }
        .badge-official { background: #007aff; }
        .badge-admin { background: #ff9500; }
        .badge-vip { background: #ffd700; color: #1a2332; }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }
        .chat-item {
            padding: 14px 16px;
            border-bottom: 1px solid #eef4f8;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.15s;
            touch-action: manipulation;
            position: relative;
        }
        body.dark .chat-item {
            border-bottom-color: #2a3a4a;
        }
        .chat-item:active {
            background: rgba(0,122,255,0.06);
        }
        body.dark .chat-item:active {
            background: rgba(0,122,255,0.12);
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #007aff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
            position: relative;
        }
        .chat-avatar .badge-container {
            position: absolute;
            bottom: -4px;
            right: -4px;
            gap: 2px;
        }
        .chat-avatar .badge-item {
            font-size: 9px;
            padding: 0 6px 0 4px;
            border: 2px solid white;
        }
        body.dark .chat-avatar .badge-item {
            border-color: #1a2332;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .chat-name .badge-item {
            font-size: 9px;
            padding: 0 6px 0 4px;
        }
        .chat-last-msg {
            font-size: 14px;
            color: #6c7a8a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        body.dark .chat-last-msg {
            color: #8a9aaa;
        }
        .chat-time {
            font-size: 12px;
            color: #8a9aaa;
            flex-shrink: 0;
        }
        .chat-badge {
            background: #007aff;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }
        .chat-type-badge {
            font-size: 10px;
            background: #e8f0f8;
            padding: 2px 8px;
            border-radius: 12px;
            color: #4a5a6a;
        }
        body.dark .chat-type-badge {
            background: #2a3a4a;
            color: #8a9aaa;
        }
        
        .search-section {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .search-section input {
            flex: 1;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            background: #e8f0f8;
            align-self: flex-start;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.2s;
        }
        body.dark .message {
            background: #2a3a4a;
        }
        .message.mine {
            align-self: flex-end;
            background: #007aff;
            color: white;
        }
        .message .msg-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .message .msg-meta {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
        }
        .message.mine .msg-meta {
            opacity: 0.8;
        }
        .message .sender-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .message .sender-name .badge-item {
            font-size: 9px;
            padding: 0 6px 0 4px;
        }
        .message img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 4px;
            cursor: pointer;
        }
        .message video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 4px;
            background: #000;
        }
        .message audio {
            width: 100%;
            max-width: 280px;
            min-width: 200px;
            height: 40px;
            margin-top: 4px;
            border-radius: 20px;
            background: #f0f0f0;
        }
        body.dark .message audio {
            background: #2a3a4a;
        }
        .message.mine audio {
            background: rgba(255,255,255,0.2);
        }
        .message .audio-label {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 2px;
        }
        .message .msg-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .message .msg-actions button {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            color: inherit;
            transition: 0.2s;
        }
        body.dark .message .msg-actions button {
            background: rgba(255,255,255,0.08);
        }
        .message .msg-actions button:active {
            transform: scale(0.9);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-area {
            padding: 10px 16px;
            border-top: 1px solid #e8f0f8;
            flex-shrink: 0;
            background: inherit;
        }
        body.dark .input-area {
            border-top-color: #2a3a4a;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-row input {
            flex: 1;
        }
        .input-row .btn {
            width: auto;
            padding: 10px 16px;
            font-size: 16px;
        }
        .recording-indicator {
            font-size: 12px;
            color: #ff3b30;
            padding: 4px 0;
            text-align: center;
            min-height: 24px;
        }
        
        .settings-group {
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            overflow-y: auto;
        }
        .settings-group label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            display: block;
        }
        .settings-group .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eef4f8;
            align-items: center;
        }
        body.dark .settings-group .info-row {
            border-bottom-color: #2a3a4a;
        }
        .settings-group .info-row .label {
            color: #6c7a8a;
        }
        body.dark .settings-group .info-row .label {
            color: #8a9aaa;
        }
        .settings-group .btn {
            width: auto;
        }
        
        .search-msg-input {
            padding: 4px 16px 8px;
            flex-shrink: 0;
        }
        .search-msg-input input {
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .poll-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
            height: 100%;
        }
        .poll-overlay.show {
            display: flex;
        }
        .poll-card {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 30px;
            width: 100%;
            max-width: 430px;
            animation: slideUp 0.3s;
            max-height: 80%;
            overflow-y: auto;
        }
        body.dark .poll-card {
            background: #1a2332;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .poll-card h3 {
            margin-bottom: 12px;
            color: #007aff;
        }
        .poll-card label {
            display: block;
            padding: 10px 14px;
            margin: 4px 0;
            border-radius: 12px;
            background: #f0f8ff;
            cursor: pointer;
            transition: 0.2s;
        }
        body.dark .poll-card label {
            background: #263445;
        }
        .poll-card label:active {
            transform: scale(0.98);
        }
        .poll-card label input {
            margin-right: 10px;
            width: auto;
        }
        .poll-card .poll-results {
            margin-top: 12px;
        }
        .poll-card .poll-bar {
            background: #e8f0f8;
            border-radius: 20px;
            height: 8px;
            margin: 4px 0 8px;
            overflow: hidden;
        }
        body.dark .poll-card .poll-bar {
            background: #2a3a4a;
        }
        .poll-card .poll-bar .fill {
            height: 100%;
            background: #007aff;
            border-radius: 20px;
            transition: width 0.5s;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0d0e0;
            border-radius: 10px;
        }
        body.dark ::-webkit-scrollbar-thumb {
            background: #3a4a5a;
        }
        
        @media (max-width: 430px) {
            #app {
                max-height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }
        }
        @media (min-width: 431px) {
            #app {
                border-radius: 32px;
                height: 90vh;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ===== ЛОГИН ===== -->
    <div id="loginScreen" class="screen active">
        <div class="logo">
            <h1>💬 Rugrom</h1>
            <p>Простой и безопасный мессенджер</p>
        </div>
        
        <div id="loginForm" class="auth-form">
            <input id="loginUsername" placeholder="@username" autocomplete="username" />
            <input id="loginPassword" type="password" placeholder="Пароль" autocomplete="current-password" />
            <button class="btn" id="loginBtn">Войти</button>
            <div class="auth-switch">
                <button class="btn-link" id="showRegisterBtn">Нет аккаунта? Зарегистрироваться</button>
            </div>
            <div id="loginError"></div>
        </div>
        
        <div id="registerForm" class="auth-form hidden">
            <input id="regUsername" placeholder="@username" autocomplete="username" />
            <input id="regDisplayName" placeholder="Как вас называть?" autocomplete="name" />
            <input id="regPassword" type="password" placeholder="Пароль" autocomplete="new-password" />
            <button class="btn" id="registerBtn">Зарегистрироваться</button>
            <div class="auth-switch">
                <button class="btn-link" id="showLoginBtn">Уже есть аккаунт? Войти</button>
            </div>
            <div id="registerError"></div>
        </div>
    </div>

    <!-- ===== ЧАТЫ ===== -->
    <div id="chatsScreen" class="screen">
        <div class="header">
            <div class="header-left">
                <h2>✉️ Чаты</h2>
            </div>
            <div class="header-right">
                <button class="btn btn-sm btn-outline" id="settingsBtn">⚙️</button>
                <button class="btn btn-sm btn-danger" id="logoutBtn">Выйти</button>
            </div>
        </div>
        <div class="search-section">
            <input id="searchUserInput" placeholder="Найти пользователя по @username" />
            <button class="btn btn-sm" id="searchUserBtn">Найти</button>
        </div>
        <div id="searchResult" style="font-size:13px; padding:0 16px; min-height:24px;"></div>
        <div style="padding:4px 16px 8px; display:flex; gap:8px; flex-shrink:0;">
            <input id="groupNameInput" placeholder="Название группы" style="flex:1;" />
            <button class="btn btn-sm" id="createGroupBtn">➕ Группа</button>
        </div>
        <div id="chatList" class="chat-list"></div>
    </div>

    <!-- ===== ЧАТ ===== -->
    <div id="chatScreen" class="screen">
        <div class="header">
            <div class="header-left">
                <button class="btn btn-sm btn-outline" id="backToChatsBtn" style="font-size:20px; width:auto; padding:4px 12px;">←</button>
                <h2 id="chatTitle">Чат</h2>
            </div>
            <div class="header-right">
                <button class="btn btn-sm btn-outline" id="searchMsgBtn">🔍</button>
                <button class="btn btn-sm btn-outline" id="chatInfoBtn">ℹ️</button>
            </div>
        </div>
        <div id="searchMsgContainer" class="search-msg-input" style="display:none;">
            <input id="searchMsgInput" placeholder="Поиск по сообщениям..." />
        </div>
        <div id="messagesContainer" class="messages-container"></div>
        <div class="input-area">
            <div id="recordingStatus" class="recording-indicator"></div>
            <div class="input-row">
                <input id="messageInput" placeholder="Сообщение..." />
                <button class="btn btn-sm" id="sendTextBtn">📤</button>
                <button class="btn btn-sm btn-outline" id="audioRecordBtn">🎤</button>
                <button class="btn btn-sm btn-outline" id="fileUploadBtn">📎</button>
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display:none" multiple />
            </div>
        </div>
    </div>

    <!-- ===== НАСТРОЙКИ ===== -->
    <div id="settingsScreen" class="screen">
        <div class="header">
            <div class="header-left">
                <button class="btn btn-sm btn-outline" id="backFromSettingsBtn" style="font-size:20px; width:auto; padding:4px 12px;">←</button>
                <h2>⚙️ Настройки</h2>
            </div>
        </div>
        <div class="settings-group">
            <div>
                <label>Отображаемое имя</label>
                <input id="displayNameInput" placeholder="Ваше имя" />
                <button class="btn btn-sm" id="updateDisplayNameBtn" style="margin-top:8px;">Обновить</button>
            </div>
            <div>
                <label>Тема оформления</label>
                <select id="themeSelect">
                    <option value="light">Светлая</option>
                    <option value="dark">Тёмная</option>
                </select>
            </div>
            <div class="info-row">
                <span class="label">@username</span>
                <span id="settingsUsername"></span>
            </div>
            <div class="info-row">
                <span class="label">ID пользователя</span>
                <span id="settingsUserId"></span>
            </div>
            <div class="info-row">
                <span class="label">Всего чатов</span>
                <span id="settingsChatsCount">0</span>
            </div>
            <button class="btn btn-danger" id="deleteAccountBtn">🗑 Удалить аккаунт</button>
            <button class="btn btn-outline" id="showPollBtn">📊 Пройти опрос</button>
        </div>
    </div>

    <!-- ===== ОПРОС ===== -->
    <div id="pollOverlay" class="poll-overlay">
        <div class="poll-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>📊 Опрос Rugrom</h3>
                <button class="btn btn-sm btn-outline" id="closePollBtn" style="width:auto;">✕</button>
            </div>
            <p style="color:#6c7a8a; margin-bottom:12px;">Помогите сделать мессенджер лучше!</p>
            <div id="pollQuestions">
                <label><input type="radio" name="poll_q1" value="web" /> Веб-версия (браузер)</label>
                <label><input type="radio" name="poll_q1" value="mobile" /> Мобильное приложение</label>
                <label><input type="radio" name="poll_q1" value="both" /> И то, и другое</label>
                <br>
                <label><input type="radio" name="poll_q2" value="simple" /> Простой интерфейс</label>
                <label><input type="radio" name="poll_q2" value="feature" /> Много функций</label>
                <label><input type="radio" name="poll_q2" value="custom" /> Кастомизация</label>
                <br>
                <label><input type="radio" name="poll_q3" value="speed" /> Скорость работы</label>
                <label><input type="radio" name="poll_q3" value="design" /> Красивый дизайн</label>
                <label><input type="radio" name="poll_q3" value="secure" /> Безопасность</label>
            </div>
            <button class="btn" id="submitPollBtn" style="margin-top:12px;">Отправить ответы</button>
            <div id="pollResults" style="margin-top:12px; display:none;">
                <p><strong>Результаты опроса:</strong></p>
                <div id="pollResultContent"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================

async function encryptText(text) {
    try {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const key = await crypto.subtle.importKey(
            'raw',
            new TextEncoder().encode(ENCRYPTION_KEY.padEnd(32, ' ')),
            { name: 'AES-GCM' },
            false,
            ['encrypt']
        );
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv },
            key,
            data
        );
        const combined = new Uint8Array(iv.length + encrypted.byteLength);
        combined.set(iv);
        combined.set(new Uint8Array(encrypted), iv.length);
        return btoa(String.fromCharCode(...combined));
    } catch (err) {
        console.error('Encrypt error:', err);
        return text;
    }
}

async function decryptText(encoded) {
    try {
        if (!encoded || typeof encoded !== 'string') return encoded;
        
        let decoded;
        try {
            decoded = atob(encoded);
        } catch {
            return encoded;
        }
        
        const combined = Uint8Array.from(decoded, c => c.charCodeAt(0));
        if (combined.length < 13) return encoded;
        
        const iv = combined.slice(0, 12);
        const data = combined.slice(12);
        
        const key = await crypto.subtle.importKey(
            'raw',
            new TextEncoder().encode(ENCRYPTION_KEY.padEnd(32, ' ')),
            { name: 'AES-GCM' },
            false,
            ['decrypt']
        );
        const decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv },
            key,
            data
        );
        return new TextDecoder().decode(decrypted);
    } catch (err) {
        console.error('Decrypt error:', err);
        return encoded;
    }
}

            .from('verification_badges')
            .select('*')
            .in('user_id', userIds)

            result[b.user_id].push(b);
        });
        return result;
    } catch (err) {
        console.error('Load users badges error:', err);
        return {};

function formatTime(date) {
    const d = new Date(date);
    return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function formatDate(date) {
    const d = new Date(date);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return 'Сегодня';
    if (d.toDateString() === new Date(now - 86400000).toDateString()) return 'Вчера';
    return d.toLocaleDateString('ru-RU');
}

function getInitials(name) {
    if (!name) return '?';
    return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showScreen(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

async function register() {
    const username = regUsername.value.trim();
    const displayName = regDisplayName.value.trim() || username;
    const password = regPassword.value;

    if (!username || !password) {
        showRegisterError('Заполните @username и пароль');
        return;
    }
    if (!username.startsWith('@')) {
        showRegisterError('@username должен начинаться с @');
        return;
    }
    if (password.length < 4) {
        showRegisterError('Пароль должен быть минимум 4 символа');
        return;
    }

    try {
        console.log('📝 Регистрация пользователя:', username);
        
        const { data: existing } = await supabaseClient
            .from('users')
            .select('id')
            .eq('username', username)
            .single();

        if (existing) {
            showRegisterError('Пользователь с таким @username уже существует');
            return;
        }

        const { data, error } = await supabaseClient
            .from('users')
            .insert([
                { 
                    username, 
                    display_name: displayName,
                    password: btoa(password + 'salt'),
                    created_at: new Date().toISOString()
                }
            ])
            .select()
            .single();

        if (error) {
            console.error('❌ Ошибка регистрации:', error);
            showRegisterError('Ошибка: ' + error.message);
            return;
        }
        
        console.log('✅ Пользователь зарегистрирован:', data);
        
        state.user = data;
        localStorage.setItem('rugrom_user', JSON.stringify(data));
        
        state.userBadges = await loadUserBadges(data.id);
        
        showScreen(chatsScreen);
        loadChats();
        updateSettingsInfo();
        registerError.textContent = '✅ Регистрация успешна!';
        setTimeout(() => registerError.textContent = '', 3000);
    } catch (err) {
        console.error('❌ Ошибка:', err);
        showRegisterError('Ошибка: ' + err.message);
    }
}

async function loadChats() {
    if (!state.user) {
        console.log('⚠️ Пользователь не авторизован');
        return;
    }

    try {
        console.log('📂 Загрузка чатов...');
        
        const { data: personal, error: pErr } = await supabaseClient
            .from('personal_chats')
            .select('*')
            .or(`user1_id.eq.${state.user.id},user2_id.eq.${state.user.id}`);

        if (pErr) throw pErr;

        const { data: groupMembers, error: gErr } = await supabaseClient
            .from('group_members')
            .select('group_id')
            .eq('user_id', state.user.id);

        if (gErr) throw gErr;

        const groupIds = groupMembers.map(gm => gm.group_id);
        let groups = [];
        if (groupIds.length) {
            const { data: gData } = await supabaseClient
                .from('groups')
                .select('*')
                .in('id', groupIds);
            groups = gData || [];
        }

        const userIds = [];
        personal.forEach(pc => {
            if (pc.user1_id !== state.user.id) userIds.push(pc.user1_id);
            if (pc.user2_id !== state.user.id) userIds.push(pc.user2_id);
        });

        const badgesMap = await loadUsersBadges([...userIds, state.user.id]);
        state.usersBadges = badgesMap;

        state.chats = [];

        for (let pc of personal) {
            const otherId = pc.user1_id === state.user.id ? pc.user2_id : pc.user1_id;
            
            const { data: userData, error: userErr } = await supabaseClient
                .from('users')
                .select('id, username, display_name')
                .eq('id', otherId)
                .single();

            if (userErr) {
                console.error('❌ Ошибка загрузки пользователя:', userErr);
                continue;
            }

            const userBadges = badgesMap[otherId] || [];
            state.chats.push({
                id: pc.id,
                type: 'personal',
                name: userData?.display_name || userData?.username || 'Unknown',
                username: userData?.username,
                user_id: otherId,
                avatar: getInitials(userData?.display_name || userData?.username || '?'),
                last_message: '',
                last_message_time: '',
                unread: 0,
                badges: userBadges
            });
        }

        groups.forEach(g => {
            state.chats.push({
                id: g.id,
                type: 'group',
                name: g.name || 'Группа',
                avatar: '👥',
                last_message: '',
                last_message_time: '',
                unread: 0,
                created_by: g.created_by,
                badges: []
            });
        });

        for (let chat of state.chats) {
            const { data: msgs } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('chat_id', chat.id)
                .eq('chat_type', chat.type)
                .order('created_at', { ascending: false })
                .limit(1);

            if (msgs && msgs.length) {
                const msg = msgs[0];
                if (msg.content_type === 'text') {
                    const decrypted = await decryptText(msg.content);
                    chat.last_message = decrypted.length > 30 ? decrypted.slice(0, 30) + '...' : decrypted;
                } else if (msg.content_type === 'image') {
                    chat.last_message = '📷 Фото';
                } else if (msg.content_type === 'video') {
                    chat.last_message = '🎥 Видео';
                } else if (msg.content_type === 'audio') {
                    const duration = msg.duration || '';
                    chat.last_message = `🎵 Аудио ${duration ? `(${Math.floor(duration/60)}:${String(duration%60).padStart(2,'0')})` : ''}`;
                } else {
                    chat.last_message = `[${msg.content_type}]`;
                }
                chat.last_message_time = msg.created_at;
            }

            const { count } = await supabaseClient
                .from('messages')
                .select('*', { count: 'exact', head: true })
                .eq('chat_id', chat.id)
                .eq('chat_type', chat.type)
                .eq('is_read', false)
                .neq('sender_id', state.user.id);

            chat.unread = count || 0;
        }

        state.chats.sort((a, b) => {
            if (!a.last_message_time) return 1;
            if (!b.last_message_time) return -1;
            return new Date(b.last_message_time) - new Date(a.last_message_time);
        });

        renderChats();
        updateSettingsInfo();
        startPolling();
        console.log('✅ Загружено чатов:', state.chats.length);
    } catch (err) {
        console.error('❌ Ошибка загрузки чатов:', err);
        chatList.innerHTML = `
            <div style="text-align:center; padding:40px 20px; color:#ff3b30;">
                <div style="font-size:40px; margin-bottom:10px;">⚠️</div>
                <p>Ошибка загрузки чатов</p>
                <p style="font-size:13px; color:#6c7a8a;">${err.message || 'Попробуйте перезагрузить страницу'}</p>
                <button class="btn btn-sm" style="margin-top:12px; width:auto;" onclick="location.reload()">🔄 Обновить</button>
            </div>
        `;
    }
}

function renderChats() {
    if (!state.chats.length) {
        chatList.innerHTML = `
            <div style="text-align:center; padding:40px 20px; color:#6c7a8a;">
                <div style="font-size:40px; margin-bottom:10px;">💬</div>
                <p>Нет чатов</p>
                <p style="font-size:13px;">Найдите пользователя или создайте группу</p>
            </div>
        `;
        return;
    }

    chatList.innerHTML = state.chats.map(chat => `
        <div class="chat-item" data-chat-id="${chat.id}" data-chat-type="${chat.type}">
            <div class="chat-avatar">
                ${chat.avatar}
                ${chat.badges?.length ? `<div class="badge-container">${renderBadgesMini(chat.badges)}</div>` : ''}
            </div>
            <div class="chat-info">
                <div class="chat-name">
                    ${escapeHtml(chat.name)}
                    ${chat.badges?.length ? renderBadgesMini(chat.badges) : ''}
                </div>
                <div class="chat-last-msg">${escapeHtml(chat.last_message || 'Нет сообщений')}</div>
            </div>
            <div style="text-align:right; flex-shrink:0;">
                <div class="chat-time">${chat.last_message_time ? formatTime(chat.last_message_time) : ''}</div>
                ${chat.unread > 0 ? `<div class="chat-badge">${chat.unread}</div>` : ''}
                <div class="chat-type-badge">${chat.type === 'personal' ? '👤' : '👥'}</div>
            </div>
        </div>
    `).join('');

    document.querySelectorAll('.chat-item').forEach(el => {
        el.addEventListener('click', () => {
            const id = el.dataset.chatId;
            const type = el.dataset.chatType;
            const chat = state.chats.find(c => c.id === id && c.type === type);
            if (chat) openChat(chat);
        });
    });
}

async function loadMessages(chatId, chatType, searchTerm = '') {
    try {
        let query = supabaseClient
            .from('messages')
            .select('*')
            .eq('chat_id', chatId)
            .eq('chat_type', chatType)
            .order('created_at', { ascending: true });

        const { data, error } = await query;
        if (error) throw error;
        
        state.messages = data || [];
        
        if (chatType === 'group') {
            const senderIds = [...new Set(state.messages.map(m => m.sender_id))];
            if (senderIds.length) {
                const { data: users } = await supabaseClient
                    .from('users')
                    .select('id, username, display_name')
                    .in('id', senderIds);
                
                state.usersCache = {};
                (users || []).forEach(u => {
                    state.usersCache[u.id] = u;
                });
            }
        }
        
        const senderIds = [...new Set(state.messages.map(m => m.sender_id))];
        const badgesMap = await loadUsersBadges(senderIds);
        Object.assign(state.usersBadges, badgesMap);
        
        renderMessages(state.messages);
    } catch (err) {
        console.error('Load messages error:', err);
    }
}

function renderMessages(messages) {
    if (!messages || !messages.length) {
        messagesContainer.innerHTML = `
            <div style="text-align:center; padding:40px 20px; color:#6c7a8a;">
                <div style="font-size:40px; margin-bottom:10px;">💭</div>
                <p>Нет сообщений</p>
                <p style="font-size:13px;">Напишите что-нибудь!</p>
            </div>
        `;
        return;
    }

    let html = '';
    let lastDate = '';

    for (let msg of messages) {
        const isMine = msg.sender_id === state.user.id;
        const date = new Date(msg.created_at);
        const dateStr = formatDate(msg.created_at);
        
        if (dateStr !== lastDate) {
            html += `<div style="text-align:center; color:#6c7a8a; font-size:12px; padding:8px 0;">${dateStr}</div>`;
            lastDate = dateStr;
        }

        let content = '';
        let canEdit = false;
        
        if (msg.content_type === 'text') {
            content = `<div class="msg-text">🔒 Расшифровка...</div>`;
            canEdit = true;
        } else if (msg.content_type === 'image') {
            content = `
                <div style="position:relative;">
                    <img src="${msg.content}" alt="image" loading="lazy" 
                         onclick="window.open('${msg.content}', '_blank')" 
                         style="max-width:100%; max-height:300px; border-radius:12px; cursor:pointer;" />
                </div>
            `;
            canEdit = false;
        } else if (msg.content_type === 'video') {
            content = `
                <video controls src="${msg.content}" 
                       style="max-width:100%; max-height:300px; border-radius:12px; background:#000;">
                </video>
            `;
            canEdit = false;
        } else if (msg.content_type === 'audio') {
            content = `
                <audio controls src="${msg.content}" 
                       style="width:100%; max-width:280px; min-width:200px; height:40px; border-radius:20px;">
                </audio>
                <div class="audio-label">🎵 Аудиосообщение</div>
            `;
            canEdit = false;
        } else {
            content = `<div class="msg-text">[${msg.content_type}]</div>`;
            canEdit = false;
        }

        let senderName = '';
        let senderBadges = [];
        if (!isMine) {
            const chat = state.chats.find(c => c.id === state.currentChat?.id);
            if (chat?.type === 'personal') {
                senderName = chat.name;
                senderBadges = chat.badges || [];
            } else {
                const userData = state.usersCache?.[msg.sender_id];
                if (userData) {
                    senderName = userData.display_name || userData.username || 'User';
                } else {
                    senderName = 'User';
                }
                senderBadges = state.usersBadges[msg.sender_id] || [];
            }
        }

        let actions = '';
        if (isMine && canEdit) {
            actions = `
                <div class="msg-actions">
                    <button onclick="editMessage('${msg.id}')">✏️</button>
                    <button onclick="deleteMessage('${msg.id}')">🗑</button>
                </div>
            `;
        } else if (isMine && !canEdit) {
            actions = `
                <div class="msg-actions">
                    <button onclick="deleteMessage('${msg.id}')">🗑</button>
                </div>
            `;
        }

        const senderDisplay = !isMine ? `
            <div class="sender-name">
                ${escapeHtml(senderName)}
                ${senderBadges.length ? renderBadgesMini(senderBadges) : ''}
            </div>
        ` : '';

        html += `
            <div class="message ${isMine ? 'mine' : ''}" id="msg-${msg.id}">
                ${senderDisplay}
                ${content}
                <div class="msg-meta">
                    <span>${formatTime(msg.created_at)}</span>
                    ${msg.is_edited && canEdit ? '✎' : ''}
                </div>
                ${actions}
            </div>
        `;
    }

    messagesContainer.innerHTML = html;
    scrollToBottom();
    
    decryptMessagesAsync(messages);
}

async function decryptMessagesAsync(messages) {
    for (let msg of messages) {
        if (msg.content_type === 'text') {
            try {
                const decrypted = await decryptText(msg.content);
                const msgElement = document.getElementById(`msg-${msg.id}`);
                if (msgElement) {
                    const textDiv = msgElement.querySelector('.msg-text');
                    if (textDiv) {
                        textDiv.textContent = decrypted;
                    }
                }
            } catch (e) {
                console.error('Decrypt error for message', msg.id, e);
                const msgElement = document.getElementById(`msg-${msg.id}`);
                if (msgElement) {
                    const textDiv = msgElement.querySelector('.msg-text');
                    if (textDiv) {
                        textDiv.textContent = '❌ Ошибка расшифровки';
                    }
                }
            }
        }
    }
}

function scrollToBottom() {
    setTimeout(() => {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, 100);
}

// 11. ОТПРАВКА СООБЩЕНИЙ
// ============================================================
async function sendMessage(content, contentType = 'text', duration = null) {
    if (!state.currentChat) return;
    if (!content && contentType === 'text') return;

    try {
        let encryptedContent = content;
        if (contentType === 'text') {
            encryptedContent = await encryptText(content);
        }

        const messageData = {
            chat_id: state.currentChat.id,
            chat_type: state.currentChat.type,
            sender_id: state.user.id,
            content: encryptedContent,
            content_type: contentType,
            created_at: new Date().toISOString(),
            is_read: false,
            is_edited: false
        };
        
        if (contentType === 'audio' && duration) {
            messageData.duration = duration;
        }

        const { data, error } = await supabaseClient
            .from('messages')
            .insert([messageData])
            .select()
            .single();

        if (error) throw error;
        
        state.messages.push(data);
        renderMessages(state.messages);
        
        const chat = state.chats.find(c => c.id === state.currentChat.id && c.type === state.currentChat.type);
        if (chat) {
            if (contentType === 'text') {
                chat.last_message = content;
            } else if (contentType === 'image') {
                chat.last_message = '📷 Фото';
            } else if (contentType === 'video') {
                chat.last_message = '🎥 Видео';
            } else if (contentType === 'audio') {
                chat.last_message = '🎵 Аудио';
            } else {
                chat.last_message = `[${contentType}]`;
            }
            chat.last_message_time = data.created_at;
            renderChats();
        }

        scrollToBottom();
        messageInput.value = '';
        messageInput.focus();
    } catch (err) {
        console.error('Send message error:', err);
        alert('Ошибка отправки: ' + err.message);
    }
}

// ============================================================
async function handleFileUpload(files) {
    if (!state.currentChat) {
        alert('Сначала откройте чат');
        return;
    }

    for (const file of files) {
        try {
            let contentType = 'file';
            if (file.type.startsWith('image/')) contentType = 'image';
            else if (file.type.startsWith('video/')) contentType = 'video';
            else if (file.type.startsWith('audio/')) contentType = 'audio';

            console.log(`📤 Загрузка ${contentType}:`, file.name, file.size);

            if (file.size < 1024 * 1024) {
                const reader = new FileReader();
                const base64 = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                await sendMessage(base64, contentType);
                continue;
            }

            const fileExt = file.name.split('.').pop() || 'file';
            const fileName = `${state.user.id}/${Date.now()}.${fileExt}`;
            
            console.log('📤 Загрузка в Storage:', fileName);
            
            const { data, error } = await supabaseClient.storage
                .from('rugrom_files')
                .upload(fileName, file, {
                    cacheControl: '3600',
                    upsert: false
                });

            if (error) {
                console.error('❌ Ошибка загрузки в Storage:', error);
                alert('Ошибка загрузки файла: ' + error.message);
                continue;
            }

            const { data: urlData } = supabaseClient.storage
                .from('rugrom_files')
                .getPublicUrl(fileName);

            console.log('✅ Файл загружен:', urlData.publicUrl);
            await sendMessage(urlData.publicUrl, contentType);
        } catch (err) {
            console.error('File upload error:', err);
            alert('Ошибка загрузки файла: ' + err.message);
        }
    }
}

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        state.audioChunks = [];
        state.recordingStartTime = Date.now();

        state.mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) state.audioChunks.push(e.data);
        };

        state.mediaRecorder.onstop = async () => {
            const duration = Math.round((Date.now() - state.recordingStartTime) / 1000);
            const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                await sendMessage(base64, 'audio', duration);
            };
            reader.readAsDataURL(blob);
            
            stream.getTracks().forEach(track => track.stop());
            recordingStatus.textContent = '';
            audioRecordBtn.textContent = '🎤';
            state.isRecording = false;
        };

        state.mediaRecorder.start();
        state.isRecording = true;
        audioRecordBtn.textContent = '⏹';
        recordingStatus.textContent = '🔴 Запись... Нажмите ещё раз для остановки';
    } catch (err) {
        alert('Нет доступа к микрофону: ' + err.message);
    }
}

function stopRecording() {
    if (state.mediaRecorder && state.isRecording) {
        state.mediaRecorder.stop();
    }
}

window.editMessage = async function(messageId) {
    const msg = state.messages.find(m => m.id === messageId);
    if (!msg || msg.content_type !== 'text') {
        alert('Можно редактировать только текстовые сообщения');
        return;
    }
    
    const newText = prompt('Редактировать сообщение:');
    if (newText === null) return;
    if (!newText.trim()) {
        alert('Сообщение не может быть пустым');
        return;
    }

    try {
        const encrypted = await encryptText(newText.trim());
        const { error } = await supabaseClient
            .from('messages')
            .update({ content: encrypted, is_edited: true })
            .eq('id', messageId);

        if (error) throw error;
        
        const msgIndex = state.messages.findIndex(m => m.id === messageId);
        if (msgIndex !== -1) {
            state.messages[msgIndex].content = encrypted;
            state.messages[msgIndex].is_edited = true;
            renderMessages(state.messages);
        }
    } catch (err) {
        alert('Ошибка редактирования: ' + err.message);
    }
};

window.deleteMessage = async function(messageId) {
    if (!confirm('Удалить сообщение?')) return;

    try {
        const { error } = await supabaseClient
            .from('messages')
            .delete()
            .eq('id', messageId);

        if (error) throw error;
        
        state.messages = state.messages.filter(m => m.id !== messageId);
        renderMessages(state.messages);
        loadChats();
    } catch (err) {
        alert('Ошибка удаления: ' + err.message);
    }
};

function startPolling() {
    if (state.pollingInterval) clearInterval(state.pollingInterval);
    
    state.pollingInterval = setInterval(async () => {
        if (state.currentChat) {
            try {
                const lastMsg = state.messages.length ? state.messages[state.messages.length - 1] : null;
                const lastTime = lastMsg ? lastMsg.created_at : new Date(0).toISOString();
                
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('chat_id', state.currentChat.id)
                    .eq('chat_type', state.currentChat.type)
                    .gt('created_at', lastTime)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (data && data.length) {
                    const senderIds = [...new Set(data.map(m => m.sender_id))];
                    const badgesMap = await loadUsersBadges(senderIds);
                    Object.assign(state.usersBadges, badgesMap);
                    
                    state.messages = state.messages.concat(data);
                    renderMessages(state.messages);
                    
                    await supabaseClient
                        .from('messages')
                        .update({ is_read: true })
                        .in('id', data.filter(m => m.sender_id !== state.user.id).map(m => m.id));
                    
                    const chat = state.chats.find(c => c.id === state.currentChat.id && c.type === state.currentChat.type);
                    if (chat) {
                        const lastMsg = data[data.length - 1];
                        if (lastMsg.content_type === 'text') {
                            const decrypted = await decryptText(lastMsg.content);
                            chat.last_message = decrypted.length > 30 ? decrypted.slice(0, 30) + '...' : decrypted;
                        } else if (lastMsg.content_type === 'image') {
                            chat.last_message = '📷 Фото';
                        } else if (lastMsg.content_type === 'video') {
                            chat.last_message = '🎥 Видео';
                        } else if (lastMsg.content_type === 'audio') {
                            chat.last_message = '🎵 Аудио';
                        }
                        chat.last_message_time = lastMsg.created_at;
                        renderChats();
                    }
                }
            } catch (err) {
                console.error('Polling error:', err);
            }
        }
    }, 3000);
}

async function submitPoll() {
    const q1 = document.querySelector('input[name="poll_q1"]:checked');
    const q2 = document.querySelector('input[name="poll_q2"]:checked');
    const q3 = document.querySelector('input[name="poll_q3"]:checked');

    if (!q1 || !q2 || !q3) {
        alert('Ответьте на все вопросы!');
        return;
    }

    try {
        const answers = {
            user_id: state.user.id,
            q1: q1.value,
            q2: q2.value,
            q3: q3.value,
            created_at: new Date().toISOString()
        };

        const { error } = await supabaseClient
            .from('poll_answers')
            .insert([answers]);

        if (error) throw error;

        const { data: results } = await supabaseClient
            .from('poll_answers')
            .select('q1, q2, q3');

        if (results) {
            const counts = (key) => {
                const map = {};
                results.forEach(r => {
                    map[r[key]] = (map[r[key]] || 0) + 1;
                });
                return map;
            };

            const q1c = counts('q1');
            const q2c = counts('q2');
            const q3c = counts('q3');
            const total = results.length;

            pollResultContent.innerHTML = `
                <p><strong>Вопрос 1:</strong></p>
                ${renderBar(q1c, total)}
                <p><strong>Вопрос 2:</strong></p>
                ${renderBar(q2c, total)}
                <p><strong>Вопрос 3:</strong></p>
                ${renderBar(q3c, total)}
                <p style="font-size:12px; color:#6c7a8a; margin-top:8px;">Всего ответов: ${total}</p>
            `;
            pollResults.style.display = 'block';
        }

        alert('✅ Спасибо за участие в опросе!');
    } catch (err) {
        alert('Ошибка: ' + err.message);
    }
}

function renderBar(data, total) {
    let html = '';
    const labels = {
        'web': '🌐 Веб',
        'mobile': '📱 Мобильное',
        'both': '💻 И то, и другое',
        'simple': '🧩 Простой',
        'feature': '⚡ Много функций',
        'custom': '🎨 Кастомизация',
        'speed': '🚀 Скорость',
        'design': '🎨 Дизайн',
        'secure': '🔒 Безопасность'
    };
    for (const [key, count] of Object.entries(data)) {
        const pct = (count / total * 100).toFixed(1);
        html += `
            <div>${labels[key] || key} (${count})</div>
            <div class="poll-bar"><div class="fill" style="width:${pct}%;"></div></div>
        `;
    }
    return html;
}

let touchStartX = 0;
let touchEndX = 0;

document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe() {
    const diff = touchStartX - touchEndX;
    const threshold = 50;

    if (Math.abs(diff) < threshold) return;

    const activeScreen = document.querySelector('.screen.active');
    if (!activeScreen) return;

    if (diff > threshold) {
        if (activeScreen === chatsScreen) {
            openSettings();
        } else if (activeScreen === chatScreen) {
            goBackToChats();
        }
    } else if (diff < -threshold) {
        if (activeScreen === settingsScreen) {
            goBackFromSettings();
        } else if (activeScreen === chatScreen) {
            goBackToChats();
        }
    }
}

        try {
            state.user = JSON.parse(savedUser);
            console.log('👤 Проверка сессии для:', state.user.username);
            
            const { data, error } = await supabaseClient
                .from('users')
                .select('id, username, display_name')
                .eq('id', state.user.id)
                .single();

            if (!error && data) {
                console.log('✅ Сессия восстановлена');
                state.user.display_name = data.display_name;
                state.userBadges = await loadUserBadges(state.user.id);
                showScreen(chatsScreen);
                loadChats();
                updateSettingsInfo();
                return;
            } else {
                console.log('⚠️ Сессия недействительна');
                localStorage.removeItem('rugrom_user');
            }
        } catch (err) {
            console.error('❌ Ошибка восстановления сессии:', err);
            localStorage.removeItem('rugrom_user');
        }
    }

    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
    showScreen(loginScreen);
    console.log('✅ Rugrom готов');
}

init();
